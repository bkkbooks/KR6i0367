body:
  text: 疏四正解經文於中復二疏初釋題目佛說盂蘭盆經疏述曰此經總有三譯一晉武帝時剎法師翻云盂蘭盆經二惠帝時法矩法師譯云灌臘經應以文云具飯百味五果汲灌盆器香油挺燭等故三舊本別録又有一師翻云報恩經約所行之行而立名故今所釋者即初譯也記初譯晉武即西晉第四帝剎法師具云竺曇摩羅剎竺字是姓下翻法護言翻云者謂翻經置題次譯惠帝武帝子即第五帝法矩字誤合作炬準開元録亦法護翻疏中應誤具云般泥洹後灌臘經灌謂浴佛臘即夏滿經明佛滅後二時供養之法故以為名經云佛泥洹後四輩弟子四月八日七月十五日灌臘等是也疏作汲灌挺燭解者失校本經藏録又云古録皆謂重譯云與蘭盆經同本異譯者誤也今尋文殊異故為單譯則知今疏猶循古耳孤山循疏釋灌字而言臘者以七月十六是比丘五分法身生來歲首則以七月十五為歲除者非以七月十六方始入臘八月十六是歲首十五為歲除耳學者宜知三中舊本別録即古藏録開元録云附東晉録是也又失譯主故但云一師準經具云報恩奉盆經上文通列今下別指疏義淨三藏云傾自我口暢之彼心以教合機故稱佛說記以教對上傾我口合機對上暢彼心疏盂蘭是西域之語此云倒懸盆乃東夏之音仍為救器若隨方俗應曰救倒懸盆記倒懸者狀其極苦也孟子云當今之時萬乘之國行仁政民之悅之如解倒懸孟子之時諸國多行虐政民受困苦故如倒懸今用彼語以譯此名盆是華言未見梵語且依疏釋餘廣如前疏斯由尊者之親魂沉暗道載飢且渴命似倒懸縱聖子之威靈無以極其塗炭佛令盆羅百味式貢三尊仰大衆之恩光救倒懸之窘急即從此義以制經名記載則也且兼也塗炭喻其苦迫如泥塗火炭尚書云有夏昏德夏桀為君不明民墜塗炭言苦民也窘窮也疏經者正名為線義曰契經線能貫華經能持緯謂所詮之義似緯似華能詮之文能持能貫今順此方典詰是以目之為經借義助名仍加契字記初依西土翻釋西天風俗以線貫華帶於頂上經即縱經能持橫緯今下次取此方俗典則訓法訓常法則尊卑共遵常乃古今不易疏此釋扶佛地論二義中貫穿之義如上釋雜心論五義中結鬘之義也餘四者涌泉出生繩墨顯示記佛地論貫攝二義貫義同此或可線同貫義經同攝義雜心結鬘即同貫華注涌泉取無盡義出生取生善義繩墨取楷定義顯示取明了義疏次解本文分三第一序分二正宗分三流通分以三分之興彌天高判冥符西域今古同遵記初分三分以下示本緣彌天即東晉道安法師襄陽習𮢶齒初訪安云四海習鑿齒安對曰彌天釋道安因是人以彌天為稱安始以三分判經後佛地論至果分三分與彼暗合故云冥符疏初序分中諸經多有二序一證信序謂如是之法我從佛聞標記說處分明大衆同聞非謬以為證據令物信受經無豐約非信不階由是經初必須證信故智度論云說時方人生信故二發起序發明生起正宗之法如淨名寶蓋法華毫光之類記初總標一下別釋初證信序豐約猶廣略階猶入也智論問曰何以不直說般若而說住王舍城答如疏引方即是處人即是衆論中略標三種餘三亦然發起中淨名因五百長者獻五百寶蓋如來合之為一法華佛放眉間白毫相光照東方萬八千世界等疏然證信亦云通序諸經皆同故亦云經後序佛說法時未有故發起亦云別序諸經各別故亦云經前序佛先自發起方說正宗故記通別前後名義可解疏初證信者聞如是一時佛在舍衛國祇樹給孤獨園疏述曰則佛臨滅度阿難請佛令置此言也所問四事佛一一答謂一令依四念處住謂觀身不淨受是苦心無常法無我二以戒為師三默擯惡性比丘四一切經初皆云如是我聞一時佛在某處與某衆若干人等記初文阿難問四事一問依何修道二問以誰為師三問惡性比丘以何擯治四問一切經首當安何語疏引佛答注中四法破衆生四倒由諸衆生謂身為淨以苦為樂無常計常無我計我故以四法反而破之一觀身不淨頭等六分四大五根假合名身智慧明見內身五種不淨一種子二受生三住處四舉體五究竟也二觀受是苦六觸生六受六受生三受對違順中庸生苦樂捨智慧明達三受皆苦三觀心無常六識能生諸識分別攀緣謂之為心智慧了知心從緣生剎那不住念念生滅四觀法無我想行二陰及餘一切世出世法智慧達通諸法無我我所畢竟不可得即得我空是中四智為念見正破倒即是其處初觀色陰二觀受陰三觀識陰四觀想行二陰及餘諸法此乃一切大小聖賢入道初門佛令依住當自留心疏諸經多具六種成就文或闕略義必具之謂一信二聞三時四主五處六衆六緣不具教則不興必須具六故云成就今經闕於列衆也記初文二初通列六種通名成就者由假彼六緣成此一經故今下別點疏又聞成就為初異餘經者各是譯人之意謂或云如是之法我從佛聞或云我於佛邊聞如是法皆是指法之辭也記初示異謂下出譯人意皆下會同指法之辭法即所集之經疏又無我者意彰聖人皆證無我餘經有者即阿難自指五蘊假者不同情計之我亦無過也記初釋今無之意餘下次通餘有所以五蘊假者智論云凡夫三種我見慢名字學人二種思惑未盡猶有慢我無學一種但有名字阿難結集時已證無學但有名字故上文云皆證無我孤山云阿難學人能伏慢我云證無我者非疏聞謂耳根發識聽彼外聲記根境識三和合成聞缺一不成智論云耳根不壞根也聲在可聞處境也作心欲聞即聞也作心即識疏次云如是者信成就也夫信者言是事如是不信者言是事不如是故肇公云信順之辭記初標示夫下釋相故下引證肇公即秦時僧肇法師注淨名經釋如是文疏一時者師資合會說聽究竟總名一時揀異餘時謂如來說經時有無量不能別舉一言略周故但云一諸方時分延促不定故言一也記初通示一切經文不問廣略但取說經始終究竟皆名一時揀餘時者非說他經之時謂下別釋有二初約說經不一釋次約方土不定釋西竺或有國土一年三時十二月十六去為春分四月十六去為夏分八月十六去為冬分或立四時更加秋分如光明中三月是夏等同此土也相傳或立六時兩月一時正月十六去漸熱時三月十六去盛熱時五月十六去雨時七月十六去茂時九月十六去漸寒時十一月十六去盛寒時又每一日或立十二時或十八時春秋二分晝夜各九時夏至晝十二時夜六時冬至反之或三十須臾等故云延促不定也疏然諸經皆不指定時而必指定處者有說展轉招難故不用之記舉處徵時欲申教意注中標示他解但未盡理故云招難示今刪去故云不用孤山強作展轉難詞甚失文意然彼文已亡不須憶度疏今詳其意以處則不過十六國中遊化住止之處而有其數易為標指時則年月春秋寒熱晝夜寅卯須臾等時變易迅速積數無量不可說録難為標指故也記初示處定十六國出長阿含一央伽二摩竭提三迦尸四拘薩羅五跋祗六末羅七支提八跋沙九尼樓十盤闍羅十一阿濕波十二婆蹉十三蘇羅十四乾陀羅十五劍浮沙十六阿盤提遊化是國土住止即伽藍時下次明時不定寒熱即冬夏疏佛者梵云佛陀此云覺者謂覺了真妄性相之者覺有三義一自覺我空揀異凡夫二覺他法空揀異二乘三覺滿俱空合於本覺名究竟覺或名大覺妙覺揀異菩薩記初翻名謂下釋義真妄真即所證涅槃妄即所除惑業性相者謂了性如實了相如幻此之四字須約大小教門以釋不可籠通凡夫都不覺二乘不覺法空菩薩未能究竟故並為所揀覺滿非菩薩俱空非二乘衆生本性名本覺從迷獲悟名始覺萬行熏修究竟果滿即合本覺言究竟對菩薩大則對二乘妙則對三乘疏在舍衛等者處成就也真諦記云住處有二一境界處遊歷之境為化在俗之流二依止處為統出家之衆初即舍衛後即祇園又婆沙論云舉舍衡令遠人知國是總也舉祇園令近人知園是別也記初文真諦記中初引示境界是國土依止即寺舍婆沙令遠人知揀他國故令近人知揀別寺故疏舍衛此云聞物謂具足欲塵財寶之物多聞解脫之人遠聞諸國故也義淨三藏譯金剛經云名稱大城記初翻名次引證聞物言本國之美名稱謂他國所稱疏祇樹等者即祇陀太子所施之樹給孤長者所買之園疏祇陀此云戰勝波斯匿王太子也生時王與外國戰勝因以為名給孤獨者是臣之號本名須達多此云善施謂給孤孤者少而無父也給獨獨者老而無子也即是善施又常行施故名善施鄉人美之號給孤獨記列名為二初太子名波斯匿此翻和悅次長者名翻釋可解疏然園是須達所買樹是祇陀所施園總樹別先合標園今以禮別尊卑故樹先園後記約總別則宜先園後樹據君臣則先樹後園禮別尊卑語出曲禮疏西國呼寺為僧伽藍此云衆園以佛教東流初至中國止鴻臚寺賓異域僧僧既漸多散置別館存其本號皆曰寺焉記初示西土以下次示此方寺即國家司存之名鴻臚寺本禮四夷遠國之舍騰蘭初至即止其中因以為名疏其買園施樹者涅槃經說須達長者為兒娉婦詣王舍城因見佛發心請入舍衛說法佛令舍利弗隨歸先揀住處揀得祇陀太子之園長者問買太子戲云側布黃金滿即賣之長者便欲交付太子云是戲言共請斷事之人被斷令依先語長者載金側布唯餘一隅太子見其不惜財寶知佛殊勝遂施所餘之地置立門屋施園中樹以為林蔭二人共成精舍請佛居之故云祇樹等也記初買園緣初須達虔請娉娶也此時佛在王舍城往彼因見佛下二遣人擇處長下三布金買園共請斷事者彼方俗法令依先語太子君上理無戲言故太子見其下次施樹緣二人下總結可知疏闕衆成就者但文略也如無常經等然有其時必具徒衆故經末云四輩弟子歡喜奉行記初示文略無常經亦名三啓經亦不列衆餘應更有故云等也然下明義具師資說聽故名一時則知有時其必有衆仍引末文可驗前略疏二發起者此經既以孝順拔苦為宗故託救母之緣而為發起文分為六第一知道已證第二知恩欲酬第三攀慕遍尋第四得見所在第五慟哭往救第六惡習現前記初敘意二分文疏今初大目犍連始得六通疏述曰此人姓大目犍連唐言采菽氏彼國上古有仙常食菉豆尊者是彼種族故也名尼拘律陀即樹名也尊者二親因祭此樹神而生尊者故名此也是王舍城中輔相之子時人貴其種所以稱其氏也記若據姓氏本無大字以同名者多故加標簡餘處或加摩訶者即翻大也尼拘律陀此翻楊柳疏始得六通者疏始即是初初得聖道便度二親者本因親而修道故也道雖無異本願各殊故諸聖者不必皆爾記初示目連本因道下明諸聖各異道無異者斷證同故本願殊者發心不一故疏六通者一神境通知證神境故亦名如意通身如其意欲往即到故二天眼通三天耳通謂能見能聞若近若遠障內障外色聲等故四宿命通能知宿世本生本事故五他心通謂於定散漏無漏心一切能知故六漏盡通謂身中漏盡而能知故六皆無壅故總名通記神境亦名如意此攝二種一能轉變自身他身世間所有隨心自在即神境也於深禪中發智證得故云智證二能飛行速到山障無礙即如意也天眼天耳謂於定中發得色界四大清淨造色住眼耳根中即能見聞六道衆生及一切世間形色音聲近遠對聲障內外對色宿命者謂於定中發智能知自他過去一世二世百千萬世乃至八萬大劫宿命即本生也及所行之事即本事也他心者謂定中發智能知六道衆生心種種緣念事即定散等定散攝三界漏無漏總世出世漏盡者謂於定中發無漏真智斷盡三界漏結即身中漏盡也六皆聖人修得前五亦通業報得疏第二知恩欲酬欲度父母報乳哺之恩疏述曰度謂度脫然報恩兩字但是通標虗位度脫正是其報乳謂母乳哺是嚼哺乳哺如齊食是恩之實事度脫如扶輪是報之實事記初釋上句然下報恩二字未見定實故云通標虗位欲顯度字是的指報恩之實耳乳下次釋下句注中舉事類顯如前已引疏然父母有遠近恩有輕重報有分全記通標可解疏遠者七世乃至多世近者即生此身記初文且一往粗分若以七世展轉相望乃至多世一一皆有遠近疏七世者外教所宗人以形質為本傳體相續以父母已上為七世故偏尊於父佛教所宗人以靈識為本四大形質為靈識所依世世生生皆是父母生養此身已去乃至七生所生父母為七世寄託之處唯在母胎生來乳哺懷抱亦皆是母故偏重母是以經中但云乳哺之恩也記初儒教尚形不知靈識故父祖為七世不知三世故次明佛教反上二義尋文可知疏乃至多世者於中偏取歸依佛已來所生身之父母以能生我修道之器故諸佛成道之時多生父母皆相會遇聞法獲益記未歸三寶雖有劬勞未為至重故取歸佛以為分齊若准梵網一切衆生皆我父母則其多世通於無始也疏恩輕重者此生父母最重餘漸輕也記前生已上轉轉相遠七世至於多世展轉相望故云漸輕疏報有分全者侍養一生為分度脫多生為全記侍養一生通二教度脫多生局佛教疏經云左肩擔父右肩擔母遍行大地亦不能報恩故知此生所報設同孟宗董黯董永之類亦為分也今經云欲度者明其全也若總不報便是不孝罪人況加逆事記初明分報俗以左為上故父在左右為下故母在右有云寫訛西土以東為尊左北右南北方是陰故母左南方是陽故父右然遍行大地豈專東向耶依經為正此蓋經家特舉勞苦以彰難報未必擔也孟宗等事並如前引今下次明全報疏且泛論一切人恩華嚴經云不知恩者多遭橫死觀佛相海經云是阿鼻因諸恩尚然況於父母之恩無可校量記華嚴示現報觀佛相海明生報橫死謂不能盡壽夭殤而死疏故詩云第十三周幽王好征伐民人勞苦孝子不得終養耳蓼蓼者莪匪莪伊蒿哀哀父母生我劬勞乃至無父何怙無母何恃出則䘖恤入則靡至父兮生我母兮鞠我拊我長我育我顧我復我出入腹我欲報之德昊天罔極記注第十三卷幽王又是第十三主詩有六章四章章四句前二章後二章二章章八句中間二章第一章四句如疏引蓼蓼長大貌莪字書云草名似斜蒿匪非也伊是也莪已長大視之反謂之蒿喻在憂思心不精別其物哀哀者恨不得終養報其生己之苦第二章四句疏中不引蓼蓼者莪匪莪伊蔚蔚音尉爾雅云蒿注云青蒿謂有子者蔚牡注云即無子者去刃反哀哀父母生我勞瘁瘁病也第三章八句疏引後四句故云乃至瓶之罄矣維壘之耻瓶小而盡壘大而盈故為壘耻刺王不使貧富圴也鮮民之生不知死之久矣鮮寡也生不如死恨之深矣即接疏中無父下四句怙恃並依賴也出門則思而憂故云䘖恤銜含恤憂入門未見則心無所詣故云靡至靡無第四章八句如疏備引父生我者本其氣也鞠養也拊拍也畜藏也長謂長大育謂覆育顧回視也復反覆也腹懷抱也之猶是也罔無也第五章四句南山烈烈民人苦役視南山烈烈然言其高峻難至也飄風發發發發疾貌言寒且疾飄音瓢疾風也民莫不穀穀養也言他皆得養其親我獨何害我獨何故覩此寒苦之寒害音曷第六章四句南山律律同上烈烈飄風弗弗同上發發民莫不穀我獨不卒卒終也言我獨不得終養父母舊記誤云前四章章四句後二章章八句故具引正之想無惑矣疏故三藏云父母義高天地恩深巨海是以係仰顧腹之恩思答劬勞之德記係猶繫也顧腹見前詩中疏父母恩重云父母懷抱和和弄聲含笑未語飢時須食非母不哺渴時須飲非母不乳云云十指甲中食子不淨云云計論母恩昊天罔極嗚呼慈母云何可報云云至於行來東西鄰里井竈碓磨不時還家母忽心驚兩乳流出即知我兒家中憶我即便還家反如嚙指心痛記從初至不淨敘恩深和和學語之聲指甲受穢食之不惡計下歎難報至於下乃至後段莫復過是來並彰愛重此敘寒賤之家為人傭作故云井竈等不時謂不及時注中即曾子出外人傳曾參殺人母嚙指念之參即心痛此即母感於子經中子感於母復云反如疏問詳此經文淺朴偏誡貧賤之流何也答君子自孝故偏誡小人又君子有簞瓢之貧何妨碓磨等事偏敘艱勤之語始彰鞠養之勞耳記問詞淺朴二字宜乎刪之由是佛言深所不便答中初約小人答又下次通君子答君子小人約行分異不取貧富簟瓢即顏子論語云子曰賢哉回也一簞食一瓢飲以竹盛飯用瓢貯水在陋巷人不堪其憂回也不改其樂他人不能堪其憂而回自樂賢哉回也疏又云其兒遙見母來或在闌車搖頭弄腦或復曳腹隨行嗚呼向母母為其子曲身下就長舒兩手靡拂塵土鳴和其口開懷出乳用以與之母見兒歡兒見母喜二情相交恩愛慈重莫復過是云云既至長大朋友相隨梳頭摩髮欲得好衣覆蓋其身弊衣故破父母自著新好綿帛先與其子至於行來官私急疾傾心南北逐子東西橫簪頭上既與索婦得他女子父母轉疏私房屋室共妻語樂父母年高氣力衰老終朝至暮不來借問或復父孤母寡獨守空房猶如客人寄止他舍常無恩愛或無襦被寒凍苦辛厄難遭之太甚年老色衰多鐃蚤虱夙夜不臥長吟歎息何罪宿𠍴生此不孝之子或時呼喚瞋目驚怒婦兒罵言低頭含笑乃至云云帝釋梵王諸天人民一切衆會聞經歡喜發菩提心號哭動地淚下如雨記即接上文曳腹俗謂匍匐鳴和即口相接至於等者謂行往出外忽有公私急疾之事既與下明悖逆父孤無妻母寡無夫或無襦被下傳文脫誤正本云單寒苦辛飢羸之甚夙早也帝釋下示聽衆得益文中發菩提心可例今經非人天明矣疏評曰細思其事誠哉是言或有母不如此兒不如彼者百中之一也良由衆生無始無明迷真執妄既根本顛倒故枝末一一皆然禍哉凡愚云何可度記初歎事實母不愛子兒不悖逆百中之一言其少也良下推所以妄起無端故云無始懵然不覺故曰無明不達自心常住寂滅故曰迷真反認四大六情為己身心計我我所故云執妄上二句明惑故云根本從惑起業故云枝末且約上經於親反疏於疏却親等非唯背親一切顛倒故云一一皆然末後二句傷其癡暗教所不被疏三攀慕遍尋即以道眼觀視世間疏述曰觀求生處是天眼通由證道而得故云道眼也記或可顯示修得簡非業報故加道字疏世間有二謂三界是器世間六道是有情世間記亦名無情有情二種世間疏然尊者喪親之日猶是凡夫不知父母生於何道今成聖果力可追求故以天眼上下觀視於三界處尋六道身得通便觀故云即也記可解疏四得見所在見其亡母生餓鬼中不見飲食皮骨連立疏述曰本觀世間俱尋父母父生樂處不假施勞既非經宗故此不述母生鬼道已屬三塗復在餓中是鬼之極苦拔濟苦者唯盂蘭盆發起正宗意在斯也記施勞猶用功也疏生餓鬼中是異熱果酬引業故不見飲食是等流果酬滿業故是慳食之業也皮骨連立是增上果記所明三果二業理趣深微故當委示義門分三初釋名異類而熟故名異熟以因通善惡善惡有記造成因種果唯無記故至果成熟報法非因果性別故云異類或約異趣或云異時記今並不取等流者與因同類故增上者更甚於因故二明體者異熟有二一真異熟即第八識最初結生展轉相續至捨壽時亦最在後為總報主名真異熟此局大教下通大小二異熟生之異熟謂從真異熟中種子發現今即今無記報得色心名生之異熱今此具兼二種不可偏判等流增上並依生之異熟而分異耳上三種果並通六趣不唯在鬼三明因中又三初云二業名引業謂有勝力牽引趣生滿業謂於總報之上莊嚴圓滿因唯有二果則有三增上無因即上二業餘勢所成二辨二業體凡善惡業皆有三品三位明之一約境於劣不殺為上如蚊蟻等於勝不殺為下如父母等餘者為中不善反之二約心猛利心作為上泛爾心作為下餘則為中善惡業皆爾三約時若善若惡但三時無悔為上二時無悔為中一時無悔為下今並取上品為引業下皆滿業三明二義相大約三歸五戒生人八戒十善四禪四定生欲色無色天強勝多疑者生修羅嗔心造十惡業引生地獄貪心造者生餓鬼愚癡心造生畜生引業所感名總報滿業所感名別報由此互作四句一總善別不善人受貧窮疾病二別善總不善畜有肥好莊嚴等三總別俱善人道受富貴等四俱不善畜類有盲跛等俱舍云一業引一生多業能圓滿是也今目連母當第四句問此二種業何識所造答通大小乘並第六識造以強勝故前五識亦能造滿不能造引以力微故第七識但與前六為染汙第八止能含藏已成業種並不能造七八二識小教不談文中三果二業分對可知是慳食業者即青提緣也皮骨連立言其枯瘁唯皮連骨而住耳疏準正理論中說鬼本住在於此下五百由旬縱廣亦爾有琰魔羅界一云此瞻部四邊直下等從此展轉散趣餘方以人間一月為一日乘此積月積年壽五百歲記此下即指南州琰魔羅亦云閻羅具云閻魔羅社此翻雙王兄及妹皆作地獄主兄治男事妹治女事故曰雙王或云苦樂並受故云雙也獄報是苦居尊故樂餘方山林樹廟等注中示異不同上論限數量故日月歲數且據一相不必一定疏然鬼有三種一無財鬼亦無福德不得食故二少財鬼少得淨妙飲食故三多財鬼多得淨妙飲食故記財即飲食淨妙食者雖是穢物餓鬼難得自謂淨妙疏此三種中復各有三疏初無財三者一炬口鬼謂火炬炎熾常從口出由前生燒壞村柵焚炙賢良以此求財墮於地獄從地獄出墮此鬼中故正法念經云若人貪嫉枉奪人財破人城郭殺害抄掠得財奉王大臣轉增凶慕墮熾然餓鬼中二針咽鬼謂腹大如山咽如針孔謂破齊夜食盜竊衆僧之食故故齊法清淨經說目連路逢數百萬人頭如太山等三臭口鬼謂口中腐臭自惡受苦以多貪名利自是非他讚歎惡人毀謗賢善故據此三種寧吞鐵丸不食信施記初炬口者即行軍劫盜多受此報先出報相後云業因餘八皆爾臨文自點賢良謂善人餘二可解據下申誡疏少財三者一針毛鬼毛利如針行便自刺為貪利故妄行針炙及刺畜生但為求財不能愈疾故二臭毛鬼毛利而臭自拔受苦以販賣豬羊烹宰鵝鴨湯爛刀剝痛楚難堪地獄罪終墮斯鬼趣三大癭鬼咽垂大癭自決噉膿由嫉妬於人常懷瞋恨故記愈音雨病差曰愈癭於郢反瘤也決音穴下流也疏多財三者一得棄鬼謂常得祭祀所棄食故以罪多福少少施多慳棄擲之物方能惠施故二得失鬼謂常得巷陌所遺食故以於現財常生慳著擬欲失者方起捨心故三勢力鬼謂夜叉羅剎毗舍闍等所受富樂類於天人或依樹林或住山谷或居靈廟或處空宮形竪而行屬於鬼趣此等變化多端者以因地罪福不精故惑樂相雜故付法藏傳中說僧伽耶舍比丘遊大海邊見妙宮殿其家鎖二鬼等云云記夜叉此云輕捷羅剎此云可畏毗舍闍此云啖精氣形竪行者異於畜趣皆旁行故惑樂者惑謂多疑樂謂不受飢渴等苦今時作福不識因果互用三寶強勝過人雖徒役力多墮斯類故下引證見宮殿等者彼云見一宮殿七寶莊嚴食時已至即往乞食是時舍主出迎請入就座耶舍見其家內有二鬼倮黑飢瘦鎖其身首各著一床耶舍慳問舍主答曰斯鬼過去一是吾息一是兒婦我昔布施而彼夫妻常恚惱我因立誓曰如此罪業必受惡報若受罪時我當看汝由是因緣得斯苦惱所鎖二鬼自屬無財今引舍主是勢力鬼疏今尊者之親是無財鬼中不見飲食故炬口鬼也食未入口化為火故記然今目連之母臨食變火口無火炬據相非類且從疏解疏又有處說餓鬼有三種一外障以得遇水時即見人執刀杖等障故二內障口有火炬或咽如針故三無障見河是猛火或食糞穢或自拔自噉等記初二即無財鬼三即少財鬼疏今尊者之親當內障也疏上來諸鬼等皆出自心因行既招果報必應譬如影響由於形聲雖父母至親不相替代記初二句推能造次二句示所造即因果也譬下引喻影響如果形聲似因雖下彰自受疏故諸智者宜各勵心儻遇善緣不應空過一朝去世誰為修崇縱託子孫七分獲一況無孝子悔恨何追記勵謂勉勵七分獲一者隨願往生經云普廣菩薩白佛若有父母親族命終墮三途八難受諸苦惱得為修福否佛言七分之中唯獲一也何故爾緣去世不信道德故若以亡者嚴身具以施三寶此福最多可拔地獄之殃往生淨土有子修崇尚獲少分子孫不孝則冥路茫茫孤魂獨遊三途受苦悔不可及故云況無等追及也疏具濁世凡流鮮懷仁孝唯憂妻子豈念幽靈貧賤者迫以飢寒富貴者荒於財色設能追福厭課者多竭力罄心萬中無一世途目擊豈不昭然記鮮少也迫謂逼迫荒迷也厭課謂事不得已而為之竭罄皆訓盡擊猶對也疏故恩重經云夫妻和合同作五逆或時呼喚急速走使十度九違不相從順罵詈瞋毒生存尚爾沒後可知身既不仁兒豈能孝故昔有送祖林野乃持輿回歸以古觀今雖跡異而心同也記初引經急速走使謂父母有急切之事欲使其子十度經作十喚毒字寫錯經作瞋恚孤山云走使下依經有父母之語四字檢經並無又云瞋毒字誤合作嗔目皆非生下舉存況沒身下推己所致送祖林野者孝德傳云元啓年十歲其祖年老父母令啓輿送深山啓苦諫不從既而送往乃收輿而返父曰此何用耶啓曰復當送父父遂感之方復收養然啓本欲感動其父而非不孝今且取子孫倣上之義耳跡異謂古今事別心同謂相承不孝疏五慟哭往救目連悲哀即以鉢盛飯往餉其母疏述曰悲哀者生育恩重如上所陳死別隔生忽然再見縱使顏容仍舊亦可涕泣悲傷況覩鬼形皮骨連立喉中烟𦦨腹裏空虗苦似倒懸命唯喘息豈不能碎身劈踊竭氣號咷恨罪逆之偷安痛慈親之受苦經標總意但曰悲哀細察當時疑不爾記拊心曰劈跳身曰踊號跳大呼也父母在難子不能救謂之偷安經標下示經略意疏故三藏科云摧慟釋云感激徹於骨髓號呌動於天地記三藏即慧淨三藏舊疏科為摧慟往救所以今疏不依用者以經文語簡但曰悲哀科須貼經故易之耳然猶可證碎身等義故復引之慟音洞哀過也疏鉢飯往餉下同三藏母既氣綿夕漏厄在朝飢飢而且渴理須救濟濟此之急飯食為先故以鉢盛飯持餉於母記下並舊疏故注示之綿微也謂微微喘息以過長夜漏即更漏厄苦也謂苦在終朝之飢疏六惡習現前母得鉢飯便以左手障鉢右手摶食食未入口化成火炭遂不得食疏述曰境隨心變果藉業成餓因未除飽緣寧致鬼是炬口食近口而熾然水作堅氷氷近湯而確爾即知神力不禁業力除飢要且除慳故六通往餉而招殃百味盆羅而拔苦大哉業熟可思者焉記初敘惡習初句明食化次句推宿因餓下二句明不得食鬼下四句舉喻對顯水喻宿因氷喻今果近湯確爾喻聖力不能救確堅也即下次彰業重初二句標示禁字平呼勝也故下二句配釋對上二句文義可見即知盆供為除慳習慳即鬼業業盡果亡是以目連奉教以追嚴慈母應時而解脫大慈救濟要在於慈大下二句傷歎業果成熟聖力莫加理越凡情故非思及孤山云宿善業熟得子度脫者甚非文意疏今左手障鉢慳恐餘侵右手摶食貪於自給慳貪猛盛如此現行飯食劣緣若何充濟故化為火不得食也記可解疏上來序分竟疏自下正宗文分為二初目連悲陳苦危後如來廣示因緣疏今初目連大呌悲號涕泣馳還白佛具陳如此疏述曰子急告父臣急告君自力不如理宜投佛弟子勤觀四諦已證三明可以反覆山河回轉日月豈料母縈極苦命若倒懸竭其孝誠盡其神變竟不能令除惡報暫濟飢腸所以呌泣奔還備申哀懇記初明告上之意上二句引況下二句正明即資急告師也弟子下次明陳告之辭為三初敘己功力初句敘因次句示果三明者謂過去宿命明二現在漏盡明三未來天眼明即六通中三餘三但有通義故不稱明豈下次明母業重力不能加所下三明投佛據此經文合在序分彼宗判教大途皆爾意欲發後佛言故節序文在正宗耳疏後如來廣示因緣中且依三藏大分八段第一彰母罪深第二明子德薄第三斥邪無力第四顯正有能第五許以救方第六示其正法第七孝子領悟第八慈母獲益疏今初彰母罪深佛言汝母罪根深結疏述曰有經說定光佛時目連名羅卜母字青提羅卜欲行囑其母曰若有客來娘當具膳去後客至母乃不供仍更詐為設食之筵兒歸問曰昨日客來若為備擬母曰汝豈不見設食處耶從爾已來五百生中慳慳相續故云罪根深結記八段始終次第可解初段引緣中未定所出故標有經世有目連經與此不同乃人造僞經耳定光遠古佛也未見解釋今以意求寂而常照故曰定光舊記云即是然燈定合作錠有足曰錠無足曰鐙今詳錠字自音為矴或音定曰乃錫之屬又與鐙自是食器亦非燈也疏罪謂身口之業根謂慳貪之心多生相續為深交固難解為結從慳所起皆是罪業非唯彼時一度妄語記身口是業道慳貪是煩惱道相續難解是苦道從下轉釋深結之義五百生慳造業無量故云從慳起等疏謂慳貪是苦根所作是苦業餓鬼是苦果為三道也若準十重戒中慳亦是業唯貪為惑記初示三道苦根即煩惱業果由生故云根也若下辨異十重即菩薩戒十波羅夷所制彼云若佛子自慳教人慳等戒所制者即屬業非而不制貪故知屬惑疏問五百生慳為人為鬼答人鬼相間造受相資若唯人身不名惡報若唯鬼身不應造業或亦為畜於理無妨但慳習不除即名相續記初二句正答若下四句互顯以人是善道故不常為人鬼不能造業故不常為鬼或下示餘趣文出畜生義該地獄疏問目連自定光佛世已來所生之母不一如何偏救彼之青提答青提與目連緣深今生復為其母但救此身所生之母非謂救彼遠世青提餘論云云皆為未達記準上經文今生之母即遠世青提故須問釋答文可解餘下斥非即應古疏別有解釋彼文已亡未知所說疏第二明子德薄非汝一人力所奈何疏述曰汝母慳心慳於一切時經多世事歷多人豈汝一人力可濟拔記慳一切者謂所慳物非唯食也疏第三斥邪無力汝雖孝順聲動天地天神地祇邪魔外道道士四天王神亦不能奈何疏述曰三藏云縱汝感天靈於上界激地祇於下方縱攝邪魔橫羅外道統六合以同家總八部為一衆併其神力亦不奈何記激動也縱竪也羅謂包羅四方上下為六合八部者四天王下各有二部鬼神或可天龍夜叉等併合也疏外道道士者外道中之道士也揀內道中之道士佛教初傳此方呼僧為道士故也記道士者本釋子之美稱晉宋已前多呼僧為道士故翻譯之家特須標簡疏四天王者毗沙門等護持世界者也記毗沙門即北方天王等取東方提頭賴吒南方毗留勤叉西方毗留博叉疏第四顯正有能當須十方衆僧威神之力乃得解脫疏述曰三藏云一縷不能制象必假多絲一人不能除業必資衆德記喻法相對可解疏今詳前後解文以邪正一多相對乃有四句一正而非多此不能救故前非汝一人奈何二多而非正亦不能救即前神祇邪魔外道等也三亦多亦正方可救拔即十方僧也四不多不正居然不可故經無文記前後經文者初二兩句是前文第三一句是當科望前為後居猶必也疏第五許以救方吾今當說救濟之法令一切難皆離憂苦疏述曰今當說者正是許辭救濟法者是所許事令一切等者千鈞之弩不獨為鼷鼠發機三界之尊豈偏令汝母離苦記第五所許事即次科示正法也三十斤為一鈞鼷鼠說文云小鼠也機即弩牙法合可解疏第六示其正法於中分二初教孝子獻供之法後教衆僧受供之儀疏初中復有五段一定勝時二發勝意三設勝供四讚勝田五獲勝益謂自恣日為勝時如春陽之月孝心為勝意如精新種子百味百果等為勝供具如好牛犂以之供養如能耕墾賢聖為勝田如膏腴之地存亡父母六親眷屬乃至七代離苦生天為勝益如千廂萬斛秋收冬藏經文意勢豈不然乎智者詳之如指其掌記開章五段次第有序膏腴肥地也廂合作箱車也如指掌者言其易見也疏今初第一定勝時佛告目連十方衆僧七月十五日僧自恣時疏述曰梵語僧伽此云衆和合謂若衆而不和如群商群吏及軍衆等不名僧寶若和而不衆如二人同心之類亦非僧寶衆而和合為福之因方名僧寶記初翻名僧伽止翻為衆復加和合乃是義用非對翻也謂下釋義群吏即公吏二人同心者此周易繫辭明同人卦彼云君子之道或出或處或默或語此言迹異下明心同二人同心其利斷金謂人心同則裁斷成決如刃之利金性堅剛而能斷之喻利之甚同心之言其臭如蘭心同言合如蘭之香言其可愛臭謂蘭之氣也疏和合者有六種謂身和同事語和同默意和同忍戒和同修見和同解利和同均也記六和上三是相和下三即體和此六並號事和均等也疏儒說小人君子或和或同今釋子比丘和而同也記論語云君子和而不同謙光守正小人同而不和羣黨私已釋子和而又同則與儒中君子優劣可見矣疏今云十方者法無限局豈隔親疏衆僧者唐梵重標譯人之拙記法無限局謂該一化據通餘法且指自恣衆僧之言聯綿成句未必為拙如似懺悔可以例之疏七月十五日前三月夏安居竟故可自恣自恣有三日或十四或十五十六今舉中間也記初正釋安居通三位四月十六為前五月十六為後中間二十九日為中前安居七月十五夏滿後安居八月十五夏滿中安居隨日不定今云七月十五即當前安居也自恣三日出四分律增三中文準南山事鈔定須十六自恣非謂前二不通恐謂解制向前出界成破夏故安居自恣律部廣之非學不知故不繁引疏此剩僧字去之又句闕亦是譯之失也何不云共自恣時記剩僧字者今謂不然上僧字通標一化下僧字局在一集疏指譯失考文不細疏自恣者自己之過恣他所舉謂一夏安居九旬加行不階四果亦得四禪佛設教門本意如此正法像法僧等階然雖後五百歲亦有持戒修福福是定也然將超苦海謹護浮囊猶恐當局者迷必藉旁觀得失縱不斷惑證果還希罪滅福生故偏袒於衆中白大德長老或見我過或聞我罪或疑我犯恣任所舉哀愍語我我當懺悔如此則身心清淨猶如琉璃況禪定解脫或有之矣記初略示謂下廣釋又三初敘佛教意正法下二顯被三時正像各一千年末法萬年後五百歲即金剛般若經語大集經中明五五百歲第一五百解脫堅固第二五百禪定堅固第三五百持戒堅固第四五百多聞堅固第五五百鬪諍堅固今指第五為後五百即末法之初也然將下三明自恣功益初敘制意三界苦逼無有邊底故喻如海浮囊謂熟皮為囊以鳥毛實之或以氣吹用此度海無慮沒溺即喻菩薩所受戒體出涅槃經彼云羅剎乞浮囊羅剎喻三毒欲犯戒初全乞喻犯四重二乞半喻犯十三三乞三分之一喻犯偷蘭四乞手許喻犯捨墮單提五乞微塵許喻犯吉羅經闕提舍義同吉羅菩薩皆不與喻謹護遮性故也當局謂臨境旁觀謂他人故下明行相偏袒示有罪也白大德者求他證也見聞疑者舉過根也過罪犯者語之變也如下顯益戒定慧學隨人有所得也疏供養此者力用可知豈不拔濟先亡資熏現在故三藏云比丘受歲之日大衆自恣之時僧多獲道於四果故能濟厄於七代記初正示故下引證夏竟入臘故云受歲疏二發勝意當為七世父母及現在父母厄難中者疏述曰當為者能救之心七世下所救之境約境明心故云勝也記約境明心者境是父母異餘人故疏七世者所生父母不同儒教取上代祖宗厄難中者通於存沒沒則地獄鬼畜存則病痛枷禁皆名厄難記前釋七世簡異儒宗如上已示次釋厄難通存沒者沒即七世存即現在若作現世生身釋者則通存沒疏七世生身雖似轉疏皆是生我修道之器既蒙鞠育豈負深恩故三藏云天地覆載既無憚於劬勞幽顯沉淪理合答於罔極記經文且舉七世準上歸佛已來則通多世矣天地即父母憚猶厭也幽顯即存沒沉淪即厄難疏三設勝供具飯百味五果汲灌盆器香油挺燭牀敷臥具盡世甘美以著盆中供養十方大德衆僧疏述曰具飯百味者總標也如人盛饌盤筵邀命賓客唯云喫飯故飯為總統於百味百者大數非定一百五果者一核果如棗杏桃李等二膚果如爪梨奈椹等三果如胡桃石榴等四糩果如蘇荏等五角果如菱豆等上皆舌所嘗也汲灌盆器者沐浴等所用並下牀敷臥具皆身所覺也香者鼻所嗅也油挺燭者照燎等用即眼所見者亦可香油塗身亦屬身攝西域如此盡世甘美者亦屬舌也上來於五欲境中唯闕聲也記初至舌嘗味塵也汲下觸塵香即香塵油下即色塵挺謂挺直今之蠟燭香油塗身西域雖然而非經意不須此釋上下示闕今時或以音樂螺鈸歌讚等則五塵備矣而言五欲語似非便思之疏盡世之言詳其意趣有二種盡謂富貴則盡世所有有即須求貧賤則盡力所及及則須覔即知不定少多之物但在竭盡其心亦類彼享于克誠馨於明德也記初約貧富兩釋即下示其要義尚書云鬼神無常享享于克誠謂不常受享唯亨能誠信者馨於明德如前所引疏著盆中者譯經訛錯如何牀等可置盆中應云著盂蘭盆供會之中也記初牒示如下斥非應下改正今詳疏家未善經意今為科釋經文從初至盆中示能供之物末後二句明所供之境初中又二初通列四塵盡世下別點味塵雖通衆物正在盆供恐其輕略特舉囑之智者無黨勿謂訛錯疏供養二句者正明行也記正明行者設盆正意為供聖故救親拔苦由此力故經云衆僧三乘總攝如下列故疏據經本意但可以受用物供艱大德之僧不必雕鏤金玉剪割繒綵高聳闌架等也故三藏云汝須物華四事房舍衣服飯食湯藥盆美八珍食之米麵味之𪉩醋果之李奈之芥薑歷十方而運想澄一心而供養記初示經意不下斥濫行在古尚然今時罔冒無足怪矣故下引證四事是通舉八珍是別標疏四讚勝田當此之日一切聖衆或在山間禪定或得四道果或在樹下經行或六通自在教化聲聞緣覺或十地菩薩大人權現比丘在大衆中皆同一心受鉢和羅飯具清淨戒聖衆之道其德汪洋疏述曰初二句約人讚時而總標末二句以威儀讚人總結記經標當此之日故云讚時後云其德汪洋即是威儀人下脫而字疏中間人法有其五對但文不次謂處有山間樹下對證有四果六通對行有自利利他對經行自利教化利他學有戒定對各有其文人有大小對亦名權實對聲聞緣覺為實為小十地菩薩為權為大記初總示謂下別列自他對中準知二乘非不化他但不如菩薩弘誓深廣所以他文但云自利耳戒定對中注各有其文前云山間禪定後云具清淨戒大小對中注二乘為實謂是實行非權現也據論受供須通大小賢聖及與凡夫經舉三乘且從勝說疏又總束之不出人法為三學三乘對也從初至四果禪定也次從或在下至自在教化智慧也皆同下三句淨戒也三乘者即聲聞緣覺十地大人也記人法者法即三學人即三乘言十地者初歡喜亦名入寶所二離垢三明亦名發光四炎亦名焰慧五難勝六現前七遠行八不動九善慧十法雲依天台戒疏出今詳分對前後參亂文相難曉更為科釋大分為三初二句總標或在下別列皆同下通結就別列中又二初至聲聞緣覺是二乘僧或十地下至在大衆中即大乘菩薩僧就二乘中又二前四句歎德末一句指人又四句中上三自行下句化他又自行中禪定可解得果斷惑即慧學經行調身義屬戒學又禪定經行必須託處得道教化不局方所通結中上二句明受供下三句歎道德上句歎行下二句歎所證汪洋水深廣之貌如此析文方見經旨孤山云十地權現即同法華內祕菩薩行外現是聲聞又自難曰此經與法華何異答此但密云權現不顯其人故知大異有人破曰雖不指人而明云權現豈是密耶識者試為評之疏皆同一心者是意和合謂受供時皆同運慚愧殷重心慈悲報因救濟心人雖位有凡聖德有優劣而所運心一而無異故云同也記據律意和同忍乃約法事為言今此一往且取同義慚愧是自利慈悲等即利他疏受鉢和羅飯者鉢中飯也梵云鉢多羅此云應器和字訛也今時但云鉢者略也記鉢和羅疏作應器解之若準應法師經音義云鉢和蘭此翻自恣食頗合文意疏經題云盆即是鉢也譯時隨俗題之云盆盆之與鉢皆器故也三藏釋題翻為救器記下引三藏者彼釋題云倒懸救器疏此一句經正明自恣大德受盂蘭盆供也記聖衆受飯即是設盆故疏五獲勝益其有供養此等自恣僧者現世父母六親眷屬得出三塗之苦應時解脫衣食自然若父母現在者福樂百年若七世父母生天自在化生入天華光疏述曰此一唱經有兩節意初一半者蒙悲願之力而離苦後一半者蒙慈願之力而得樂樂中有存亡之異疏初云此等自恣僧者指前五對所說也記初文指前五對不出三乘疏現世父母者生此身之父母也非謂未亡名為現世故指得益云出三塗其現在未亡之父母下自有文云福樂百年是也不應重舉三藏錯會故作異釋甚非文意記次科初示今釋非謂下遮濫三藏下斥謬解彼疏問曰何故現在能出三塗答驗因之果所謂異釋也疏六親者父母兄弟夫妻或云男女不取兄弟眷屬者一切姻戚通於表裏記六親依老子注出之注中或云未詳何典若準漢書注云六親者父母兄弟妻子蓋隨人所立故有不同姻戚皆親也表即母族裏即父族疏出三塗解脫者總明離苦也衣食自然者且翻三塗生於人道故屬拔苦之文亦可便得樂屬於後也記衣食自然文有兩釋前義為正後釋據文在前約義兼後疏若父母下明存亡得樂文相可知天華光者天上妙華光明也略指快樂之相矣記妙華光明即上界依報莊嚴之事非唯此二故云略指疏自上第二教衆僧受供之儀時佛勑十方衆僧皆先為施主家呪願願七世父母行禪定意然後受食初受食時先安在佛前塔寺中佛前衆僧呪願竟便自受食疏述曰此中前半淨三業後半具三寶記從初至然後受食為前半初受已下即後半據此科分文意未顯今詳前半敕令運意後半正教受儀尋之可見疏前中呪願口業禪定意業受食身業疏後中塔前是佛呪願是法受食是僧從他受而後食法律如此即受字亦屬法也記律制比丘凡食必從淨人受不受自捉犯波逸提故云法律如此經云先安佛前據俗舍也塔寺佛前約伽藍也孤山約在世滅後分疏塔者邊國訛語正云窣堵波此云高顯處此中意通殿塔塔安舍利殿安佛像記合云塔婆單云塔者訛而復略此下示通意疏自下大文第七孝子領悟時目連比丘及大菩薩衆皆大歡喜目連悲啼泣聲釋然除滅疏述曰淨業既成必知離苦觀因驗果聲響不差故喜而止啼也如處世刑獄囑大力人財賄既行其心已喜記言既成者從佛受教審後所修必無疑故觀因驗果配上二句聲響不差喻上因果謂如聲答響決定相應故經云釋然謂消散也下引世事以顯經意賄呼罪反亦財也疏第八慈母獲益是時目連母即於是日得脫一劫餓鬼之苦疏述曰目連聞經且是受教施設盆供合在餘時今說經次便云脫餓鬼者譯經闕略也應於正宗終處敘結集家文云爾時目連聞是法已至七月十五日施設盆供自恣僧已其母即於是日得脫一劫餓鬼之苦則文義俱顯矣記初敘闕應下義補或恐說經正當夏滿即時營設故云是時等又前示正法中五科委示盆供之法故此但云是時是日義含設供則非闕矣疏故三藏云孝子既獻供於此辰慈母乃除殃於是日大哉聖力速疾如斯疏其餓鬼受苦年劫時分待撿敘之記器界一增減為一劫目連亡母合墮一劫鬼趣歲月與人不同劫數長短未見所出故云待撿也疏自下大文第三流通分也文中有三記謂此教法被及無窮有同江河流而無雍故曰流通疏一申請目連復白佛言弟子所生母得蒙三寶功德之力衆僧威神之力故若未來世一切佛弟子應亦奉盂蘭盆救度現在父母乃至七世父母為可爾否疏述曰詳此語時亦是設供之後非一場之事至畢鉢羅窟方始總集為經也記設盆已後方復申請故非一場之事諸經多然畢鉢羅窟阿難結集之所在王舍城靈鷲山中疏目連愛其親而及他人如頴考叔諫莊公云云記下引考叔以況目連注云云者左傳云鄭武公娶于申曰武姜申即國各生莊公及共叔段共音恭莊公寤生寤寐中生驚姜氏遂惡之愛共叔段欲立之立為太子亟請於武公公弗許及莊公即位姜氏與叔段謀篡莊公公聞師兵伐之叔段奔共共國名因號共叔段遂置姜氏于城頴置音至置也城頴即鄭地而誓之曰不及黃泉無相見也地中之泉故曰黃泉既而悔之考叔為頴國封人典彊封者聞之有獻於公公賜之食食舍肉公問之對曰小人有母皆嘗小人之食矣未嘗君之羮請以遺之遺字去呼公曰爾有母遺繄我獨無繄語助也考叔曰敢問何謂也公語之故且告之悔對曰君何患焉若闕地及泉隧而相見其誰曰不然隧若今之埏道公從之公入而賦大隧之中其樂也融融賦詩也融融和樂貌姜氏出而賦大隧之外其樂也泄泄泄泄舒散貌泄音曳遂為母子如初君子曰頴考叔純孝也愛其母施及莊公純篤也施音異然考叔止及於一人尊者廣被於群有應知大士現作聲聞方便度生故為發起人到于今咸受其賜疏舉故事且欲通文細校行功實非倫匹疏二讚請佛言大善快問我正欲說汝今復問疏述曰初句標讚大善快者深契聖心後二句釋所以以正欲說即遇問辭機感相投潛通密應故言快也記大善謂其理當快問謂適我心潛通謂機投於佛密應謂感赴於機不謀而自合故云潛密也疏佛意本者欲說孝道最大故拔苦事重故盂蘭法勝故衆覩尊者勝緣機熟可教化故記四義以求佛意總括所歸無非利物權巧方便何止於數端拯濟慈悲豈專於一類孝道最大者道德本故拔苦重者大士行故蘭盆法勝者心境異故衆覩勝緣者應驗速故疏三答請於中有五疏一教起行善男子若比丘比丘尼國王太子大臣宰相三公百官萬民庶人行慈孝者皆應先為所生現在父母過去七代父母於七月十五日佛歡喜日僧自恣日以百味飯食安盂蘭盆中施十方自恣僧疏述曰雖貴賤品隔僧俗道殊自非化生濕生無不有父有母慈鳥鸚鵡尚解思恩豈況人倫而不濟拔孝之利害已具懸談既識是非須依正道故云應先為所生等也記貴即國王宰相賤即萬民庶人僧即局在僧尼俗即通收貴賤六道不出四生謂胎卵濕化若胎卵二生定有父母慈鳥者說文云孝鳥也以能反哺於母故鸚鵡者雜寶藏經說佛過去世於雪山中曾為鸚鵡父母俱盲常釆華果稻穗以奉養之其盲父母即淨飯及摩耶也然慈鳥是現事鸚鵡乃昔緣今之鸚鵡則非其類利害具懸談者即彰孝道中罪福同也未入經文義章先說故曰懸談懸即先也經云三公者周官立大師太傅太保也疏據制令必為不為即是違制故亦當於制教是以前亦屬律藏記經曰皆應非制必為不為無犯復非違制前文據此故復重明上已指非不可承用疏然佛無悲喜今於此日示現歡喜者應機緣也以佛本出世祗為勸人修行見人造業則悲見人修道則喜今比丘九旬加行日滿倍更懇誠三千界中皆同如此稱佛本意寧不欣歡此日設盆其福甚也記佛無悲喜者據自行也示歡喜者約化他也三千界者一化境也疏二教發願願使現在父母壽命百年無病無一切苦惱之患乃至七世父母離餓鬼苦生人天中福樂無極疏述曰所修必假行門所獲必由心願願者心之樂欲欲得存沒咸安存者保壽於人間常無病惱沒者遷神於天上永絶冥塗行願相資無所不利記經文願使二字是能願現在七世等即所願初釋能願上可躡前段次句即當科樂字去呼存者下次釋所願存即現在沒即七世一一配經可見後二句總結無不利者言必有所獲人有目足所往必至事有願行所未必遂故疏三教常作是佛弟子修孝順者應念念中常憶父母乃至七世父母年年七月十五日常以孝慈憶所生父母為作盂蘭盆施佛及僧以報父母長養慈愛之恩疏述曰是佛弟子修孝順者反明非佛弟子及不孝者即任不設盆也念念常憶者無終始也長養是事慈愛是心故前起行及發心願以報之也餘文可解三藏云父母結愛既念念不離心孝子報恩須年年不絶供記初釋所教人佛弟子者稟師教故修孝順者知恩重故念念下次釋所教法父母長養慈愛既無終始孝子起行發願故須盡世以行報事以願報心對待法爾不可闕一下文引證可解疏四勸受持若一切佛弟子應當奉持是法疏述曰智度論云信力故受念力故持今云奉者即受之義皆應者勗此二力記非信不能受非念不能持勗謂誡勗疏五喜而奉命時目連比丘四輩弟子歡喜奉行疏述曰四輩者僧尼士女或云人天龍鬼疑故兩存記言兩存者各有所出故疏然凡厥生靈皆依恃怙故父母恩均於天地此雖至孝不得其門今受神方兼覩靈驗必能除七世之厄難報二親之劬勞自知心有所之是以歡喜承命記初敘恩深厥其也生靈語通且目四輩恃怙即父母向引詩云無父何怙無母何恃是也此下次釋衆喜初二句敘群機無法此之一字指上生靈不得門者若非佛說餘無知故今下明得法歡喜神謂神妙方即是法序云得此法門實為妙行與此頗同覩靈驗者即目連現事之猶詣也命謂教命
