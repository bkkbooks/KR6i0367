body:
  text: 錢唐沙門元照述教是道門孝為行本既沉冥而忘返故惻隱以流慈託彼親緣興斯至教且夫行者所以趣道經者所以詮行疏者所以通經記者所以解疏此蓋名教發起之大端講學討論之要術也叔世浮侈正教支離既闕師承率從狂簡事唇吻之銛利逞記問之繁多私節游辭橫攻俗典豈念修身報德但知逐利活名辜負生成背違天地斯由傳授者鮮能開誘撰述者互有瑕疵由是輒事操觚集成新記文從簡要義取優長教有宗途理歸至當庶乎學者由記以達疏由疏以通經由經以起行由行以造道然後敷于四海施之後世而無朝夕者不在斯文乎疏盂蘭盆經疏并序記解釋經題疏文自備今略以五門料簡初分能所二簡通別三辨華梵四明立題五顯異同初中依本經題上加佛說共有七字疏為能解上六字並所解經為能詮上五字即所詮盆為能救盂蘭為所救佛為能說下並所說二通別者且就經題佛說是通下四字為別又經字是通上三字為別又疏字是通上經題為別攬別簡通則局今經今疏矣三華梵者佛與盂蘭全是梵語生善不翻說及盆經並翻梵成華疏之一字全是華言四立題者凡經首題不過人法喻三單復全具歷為七別此經則以人法喻具足為題佛說人也盂蘭喻也即下疏云魂沉暗道命似倒懸故盆字是法經云吾今當說救濟之法即盆供也上依疏解若據經音義盆亦梵語同翻倒懸則人喻為題矣五同異中按應法師經音義云梵語烏藍婆拏此翻倒懸今詳烏藍即盂蘭也婆拏即今之盆也是則三字並是梵言但音之訛轉耳疏主且據經文安著盆中之語故作華言解釋音義則梵言得實疏家則一往符經疑故兩存隨人去取相傳宋三藏云烏監婆拏盆佐那翻倒懸救器未見典據不敢信用疏即訓疏謂疏決文義使無壅并序者謂以疏題兼目序首述作從省故注以示之疏充國沙門宗密述記充國即縣邑別號今係果州九州地里記云充國漢時巴子國後以人風充盛因以名焉後漢靈帝分為南充西充二縣因省下國字耳按晉書地理志巴西郡有西充國縣南充國縣故知充國乃古全名如譙國沛國魯國之類疏主西充縣人今從古名但云充國耳若據他文多標居處今以此經宗於孝道故標父母之復由歸鄉致請因記撰述之處也宗密即疏主之名生於唐朝大弘至教平居終南之圭峰故人以圭峰稱之宣宗追諡定慧禪師諸餘化迹並載宋高僧傳沙門與述如常所解疏始於混沌塞乎天地通人神貫貴賤儒釋皆宗之其唯孝道矣記初句歎竪深次四句歎橫廣下一句結示所歎竪謂推其初始始則莫先於混沌橫乃顯其該遍偏則無出於三才竪深橫廣歎孝盡矣言混沌者儒宗謂天地萬物本於混元之氣元氣生天地天地生萬物故愚智貴賤貧富苦樂皆推天命死生變化終歸一氣然天地陰陽未分之前清濁相和故名混沌此即儒宗之至論也其次道家謂虗無大道生成養育道法自然生於元氣故云道生一混元一生二天地二生三三才三生萬物萬物歸根復于虗寂此為道教之極致也若論釋教且就小乘謂一切衆生三毒三業造立器界成住壞空四相循環各二十劫且從空劫初成世界者俱舍頌曰空界大風起傍廣數無量金剛不能壞此名持界風道以空界為虗無儒以大風為混沌道家所謂道生一也光音金藏雲布及三千界雨如車軸下風遏不聽流先成梵王界乃至夜摩天儒謂清者升天風波清水成須彌七金等滓濁為山地四州及泥犂醎海外輪圍儒謂濁者為地道謂一生二也方名器界立時經一增減經一增減劫世界方成乃至二禪福盡下生人間道謂二生三儒謂盤古生于中初食地餅林藤後餐粳米不消大小便利男女形別分田立主求臣佐等種種差別道謂三生萬物儒宗亦然總十九增減兼前總二十增減名為成劫住壞空各二十劫圭峰云空界劫中道教指為虗無之道大風即彼儒家混沌一氣是知混沌即成劫之初此時孝道已蘊其中故云始於也上並出圭峯原人論孤山云此方外教認空劫為混沌者非問今釋佛經反依儒宗云混沌者答行孝報親正存誘俗況歸鄉設會道俗同聞若指劫初則俗流難曉故標混沌則四衆通知以至下明二教同異多引儒書意亦同此孤山云此經宗旨是人天乘故得附近儒書而言混沌今謂不然佛教人天已明報應一途方便誘接鈍根豈與儒書而相附近縱是人天猶非比擬況復此經非人天乎如後廣破次明橫廣即約三才初句天地下三句並就人中以論差別或可天地約無情下並有情塞天地者即孝經云夫孝天之經也經常也謂三光照臨四時運行萬物資生古今皆然乃天之常德也地之義也義利也山澤林野所出萬物隨風土所宜乃地之為利也謂天之常德下臨區宇天之孝也地之所利養於生靈地之孝也則知孝道充乎天地之間明矣通人神者人則可知神謂鬼神總收四趣天修鬼獄雖分幽顯皆有君親則驗幽靈咸知孝敬若準下云慈烏鸚鵡尚解酬恩是則孝道通於六趣矣有云行孝感於鬼神者非貫貴賤者且就人論天子最貴庶人唯賤諸侯卿土望下則貴望上為賤孝經五章各明孝行五用雖別孝行不殊故後結云自天子至於庶人孝無終始而患不及者未之有也死而後已故無終始未有患力不及而容不行者儒釋皆宗者即下彰孝道中通明孝為二教之宗本疏自委釋不復繁詞講者臨文探引此說人神約趣貴賤據位儒釋約教三結中唯即訓獨意謂餘行局在一端獨茲孝道該貫彼此舉上諸義對歷可知爾雅云善父母為孝凡為人子當行其中故云孝道疏應孝子之懇誠救二親之苦厄酬昊天恩德其唯盂蘭盆之教也記應猶稱也孝子者通語末代報親之人懇誠言其專至苦厄目於惡道恩德不出乳養文有四句初句標舉所應之機末句結示能應之教也中間二句則通機教在機則是所應之事在教則為能應之功準下經宗備有四義一孝順二設供三捘苦四報恩引對今文唯缺設供義必具之以見他經不具諸義故云唯也疏宗密罪舋早年喪親每履雪霜之悲永懷風樹之恨記初二句敘幼歲喪親次一句示以時追慕下一句恨不及侍養舋亦訓罪意謂失於侍養遂致喪亡引過歸己是罪逆人也早年即童稚之時雪霜悲者禮記祭義云秋霜露既降君子履之必有悽愴之心非其寒之謂也春雨露既濡君子履之必有𪫟惕上丑律下他歷憂也之心如將見之今略舉秋時仍易露字則通於秋冬也風樹恨者魯史云孔子出行見虞丘子哭於路楚國相問其故對曰吾有三失是以哭之少遊學周流天下父母已終闕於侍養是吾一失素高其志不事庸君而臣節不遂是吾二失少擇交遊寡於親友老無所託是吾三失夫樹欲靜而風不止子欲養而親不待往而不返者年也不可再見者親也設以此辭遂立哭而死孔子顧謂左右曰記之可以為誡於是弟子辭歸養親者十有二焉舊引家語與此頗差請以史文為正今止用文中一句以喻事與心違故長懷歎恨疏竊以終身墳壟卒世蒸嘗雖展孝思不資神道記初二字標能思之心竊以謂私自慮之下四句示所思之事上二句明依儒行終身卒世語變義同古之人父母既喪負土為墳植柏成列廬墓三年以盡孝誠墳壟者封土為墳平除曰墓壟即墓之塋域蒸嘗即祭名禮記祭有四時春曰礿音藥夏曰禘秋曰嘗冬日蒸文中略舉秋冬且標祭禮然三年廬墓四時祭祀據論禮制未必終身今此舉久況近用顯無功耳雖下二句彰無益上句是縱謂上二事但可申於己心下句是奪謂不足助於冥路疏遂搜索聖賢之教䖍求追薦之方得此法門實為妙行年年僧自恣日四事供養三尊記初二句敘尋經求法聖賢教不出三藏律唯佛說經論通弟子諸仙諸天化人等說佛為極聖弟子則通大小聖賢小則七賢四聖大則三賢十聖仍列天仙義通凡矣索亦訓求䖍敬方法也下四句明得法稱懷上二句標歎功深下二句略示行相初中經明目連慈母墮鬼時長惑業既深神通莫救而乃假一日盆供少頃修崇能使冥途應時脫苦既彰靈驗可謂神方理絶言思故稱妙行次示行相即撮下經略示時事四事即房舍衣服飲食湯藥三尊即目三寶並世所尊疏宗密依之修崇已歷多載兼講其誥用示未聞記初二句明設供下二句示講經修崇在己是自利行講示未聞即利他行誥謂佛敕即指此經疏今因歸鄉依日開設道俗耆艾悲喜遵行異口同音請製新疏記初二句明歸鄉啓會即唐文宗大和二年徵入內殿咨問法要尋請歸山欲還終南後因衆請入蜀立先代祖師銘由是還鄉適值夏末故云依日等開謂開講設即設盆次二句示二衆相從道俗之言通收四部曲禮五十曰艾髮白如艾六十曰耆耆亦老也言悲喜者聞父母深恩而懷感愴故所以悲獲酬報勝法已得遵行故所以喜後二句明製疏緣起異口謂能請不一同音謂所請無異對古所述故云新疏即下引三藏云等是也問古既有疏何必重製答彼文已亡莫知優劣然立今廢古必不徒然或恐宗途不同或是解釋差謬或浮華而少實或質野而不文將使適叶群機宣流百世故因衆請乃製斯文疏心在松柏豈慢鄉閭式𠃔來情發揮要道記上二句述懷下二句許請松柏即墳墓所植之樹蓋指物以表父母也鄉閭閭即鄉里之門即指處以名耆老也式敬𠃔順也發謂為之發起揮謂使其流布要道與上妙行辭異義同即指此經設供報親法門以為至要耳疏稽首三界主大孝釋迦尊纍劫報親恩積因成正覺記西土此方諸師撰述必先立偈歸敬三寶所以須者凡有六義一為荷恩故二求加護故三令生信故四表敬儀故五顯勝故六開衆生佛法僧念故出南山戒本疏然三寶多種化相住持理體一體該涉大小如別所明且約化相以釋今偈初偈上二字能敬儀謂將撰疏時先致敬故形表心敬頭頂至地故曰稽首稽下也又至也三界已下即所敬境初二句舉名下二句歎德三界是所化之境欲色無色統及大千佛為化主即經云今此三界皆是我有其中衆生悉是吾子是也大孝是因行釋迦尊即果德行雖萬別舉孝統收德雖無量約姓齊攝釋迦別在教主大孝與尊通於諸佛具云釋迦牟尼此翻能仁寂默以寂默故不住生死即法身也以能仁故不住涅槃即報應也歎德中上句釋上大孝下句釋上釋迦尊纍劫且約三祗報恩須分通別通則六度萬行無非報恩別則在處奉親皆能盡孝至於成道先度慈親始為摩耶升天說法終為淨飯躬自舁棺纍劫功成故稱大孝積因者躡上報親成正覺顯今果滿梵云阿耨多羅三藐三菩提此云無上正等正覺正以簡邪覺即昭了覺有二義一者覺察對煩惱障四住如賊唯聖覺知故二者覺悟對所知障無明如睡唯聖獨悟故餘廣如後疏將永錫衆類應請演斯經欲使背恩人咸能酬罔極記初句懷機將謂將欲永長也錫即訓賜衆類即目群生在孝子則遠惡遷善在二親則離苦得樂凡在群倫莫不承賜即下經云是佛弟子修孝順者又云令一切難皆離憂苦是也次句設教至聖立言非緣不發酬目連請故說是經下二句示教意背恩人通目世間不孝之者且凡負人恩咸須知報況乎父母生育恩深為儒者苟不能立身揚名順色承志出家者又不能奉戒修心說法開悟皆為不孝盡是背恩此教所興正攝斯類酬罔極者詩云欲報是德昊天罔極言親恩至大猶天之無盡也疏我今所讚述願衆聖冥加自他存沒親離苦常安樂記初句敘撰疏讚謂助彼聖教言其志也述謂循於舊跡示其謙也次句乞加護上申歸敬則唯在釋尊此求加護則遍祈衆聖豈唯諸佛亦總三乘言冥加者聖力加物有顯有冥顯謂現覩好相摩頂放光冥謂潛被功能功成事遂不敢輒祈顯應故請冥加孤山問曰此經既屬小教何得云諸佛耶答云小乘諸部宗計不同薩婆多則不說十方戒本稽首釋師子故曇無德則許有諸佛戒序稽首禮諸佛故今云衆聖無違小宗今詳此答凡有三非一者偈中但云衆聖豈局諸佛二者曇無德部稽首諸佛由此宗中義通大乘故首標諸佛還依大教那云小宗許談諸佛三者此經大體全非小乘不究經文但循舊判強生和會引誤來蒙有智深思幸無自纍下二句立弘誓上句所誓人下句所誓事自他存沒是大心拔苦與樂即大行近則出三途苦獲人天樂遠則脫二死苦得涅槃樂自古科此三偈以為四段初明致敬二讚所歸三請冥加四發誓願又云諸論俱歸三寶今但歸於佛者以法是佛言僧是佛子舉人以攝言明父以包子有人云此之三偈即對三寶初偈歸佛自可知之次偈演經即歸法也後偈衆聖豈非僧也今詳古釋所敬雖偏而分節文相頗有倫貫然此三偈雖有三寶之義而始末敘事文理相由然非一向專談三寶故今科釋去取從中三寶具含文義宛順但知稽首兩字文局在前義須該後最後二句文局於後義必承前疏將解此經先開四段一教起所因二藏乘所攝三辨定宗旨四正解經文記標分為四初敘教起究其發端次辨藏乘顯其所屬三定宗旨指其歸趣四解經文釋其名相前三示總義後一釋別文又初後是能詮中二屬所詮或可初緣次義三行四文次第相由判釋盡矣疏初中復分為四一酬宿因故二酬今請故三彰孝道故四示勝由故記初科通於諸教下三別在今經初是填願二即赴感三明行深四顯法要疏初酬宿因者悉達太子不紹王位捨親去國者本為修行得道報父母恩然菩薩用心不務專己故開盂蘭法會以福自他二親此經所興本意如此記初正明此下結示初中又二初敘宿因然下明酬報悉達此云一切義成即淨飯王之嫡嗣故名太子不紹王位厭世榮也捨親去國踰城入山也及乎得道即還本國啓悟父王又升忉利度脫亡母即知修道本為報親疏二酬今請者大目犍連因心之孝欲度父母報乳哺之恩故出家修行神通第一觀見亡母墮餓鬼中自救不能白佛求法方陳盆供救母倒懸由愛其親施及一切故為道俗弟子請佛留此教門酬目連所問即是說經之由致也記初正明酬目連下二結示初中即是撮略一經始終文相如後自釋不勞預解就文為三初是序分自救下即正宗由愛下即流通天性本有非他使然故曰因心方大也施字音異訓移謂移及於他也疏三彰孝道者復有其二一通明孝為二教之宗本二別明二教行之同異疏初通明中記通明者對下同異別開科目故疏且明儒教以孝為本者謂始自天子至於士人家國相傳皆立宗廟雖五孝之用則別而百行之源不殊記初標謂下釋此準孝經尊卑五位總收天下並須行孝則儒教以孝為本明矣文中兩段初別舉宗廟以明立廟存祀為尊祖考國家之大事故先舉此以彰本義家國相傳者國對天子諸侯家對卿士庶人無廟但收四人按禮記祭法天子立七廟一考父也二王考祖也三皇考曾祖四顯考高祖五祖考始祖也上五皆月祭下二祧四時祭遠廟為祧有二祧祧即廟之別名即文武廟也文武遠祖有功特留故謂之祧諸侯五廟一考二王考三皇考皆月祭之四顯考五祖考四時祭之卿大夫三廟一考二王考三皇考皆四時祭顯考祖考無廟士立二廟一考二王考四時祭皇考無廟庶人無廟然此且局周家宗祖故有文武二祧若據商書云七世之廟可以觀德則知宗廟自古通規且舉大綱以遣文相寄言後學須究本宗無勞廣引俗書妄生穿鑿雖下次通約行相以顯上句明事別下句示心同孝經云愛敬盡於事親德教加於百姓天子孝也行無危溢長守富貴能保社稷和其人民諸侯孝也服飾言行皆遵禮制能守宗廟卿大夫孝也愛敬君父忠順不失能保祿位守其祭祀士之孝也謹身節用以養父母庶人孝也此所謂五孝別也百行者趣舉大數源即是本疏故開宗明義章中標為至德要道道德以之為體教法由是而生何有君子而不務本既為天經地義須令企及俯從雖論禮壞樂崩終呵衣錦食稻記初至而生正示本義何有下明在人必行雖論下明事不可廢初中開宗明義章即孝經首章也至德要道即目孝行此引仲尼首告曾子之言故云標也經曰先王五帝三王有至德孝德尊於百行要道孝道總於五常以順天下上行民用和睦上下無怨下化道德下二句亦見此章上句明行本由所依故體即本也下句明教本以從生故經曰夫孝德之本也疏加道字因上文故教之所由生也先王因孝立言垂訓次段初二句出論語彼云君子務本孝悌本立而道生五常百行由成孝悌也者其為仁之本歟仁是五常之首孝為仁行之本是知非孝則仁義道德無所依矣既下一句出孝經三才章經曰夫孝天之經也地之義也如上已釋民之行也德之本故言孝既是天常地利人生天地間固當法而行之須下一句出禮記彼云曾子謂子思曰子思伯魚子孔子孫伋伋子思名吾執親之喪也水漿不入於口者七日子思曰先王制禮過之者俯而就之賢者能過當須下就不至者跂而及之常人不至當須跂上使及之跂望也今作企義同故君子執親之喪水漿不入於口者三日此明先王立法通賢不肖則知孝道不擇於人後段中二句並出論語彼云宰我問孔子弟子三年之喪期已久矣期謂周年君子三年不為禮禮必壞三年不為樂樂必崩謂周年已久而況三年將恐禮壞樂崩故也子曰食夫稻衣夫錦於汝安乎食音嗣衣去呼曰定宰我答也子曰汝安則為之夫君子之居喪食旨不甘旨美也聞樂不樂居處不安故不為也今汝安則為之再言者責之深雖論謂宰我申問終呵即孔子重責疏甚哉孝之大也聖人之德又何以加於孝乎記三句並孝經初句出三才章曾子聞上五孝故驚而歎之今用彼語總結前文下二句出聖治章經曰夫聖人之德又何以加於孝乎聖德不加大可知矣疏次釋教以孝為本者然一切諸佛皆有真化二身釋迦化身說隨機權教舍那真身說究竟實教教者經律也經詮理智律詮德行記初句標然下釋初二句通舉釋迦下別示真身即報化身即應若約三身即真中兼法若論四身即化中分應或處說生法二身生即是應法中含報若離若合隨宜不定古今用與各據宗途無以己宗校他同異隨機權教總收鹿苑鶴林一代時經究竟實教唯局華嚴一部然此且據賢首一家所判耳孤山更收圓覺勝鬘此乃化身所說還屬隨機舍那者具云盧舍那此翻滿淨滿謂果圓淨即障盡教者下總釋教義權教經律各有大小經則可知二部五部是小乘律善戒瓔珞即大乘律實教純一大乘經是華嚴律即梵網理智即定慧德行即戒業真化二身權實兩教並推孝道則知釋教宗孝明矣疏故我盧舍那佛最初成正覺時便說華嚴大經菩薩大戒戒雖萬行以孝為宗故初標云爾時釋迦牟尼佛初坐菩提樹下成無上正覺初結菩薩波羅提木叉孝順父母師僧三寶孝順至道之法亦同孔聖云至德要道孝名為戒亦名制止記真身實教則梵網為最先化身權教則涅槃為終極故引初後攝盡中間初料為二初懸敘說華嚴者總舉大部也菩薩戒者別舉最初也故下引示為四初標化主問舍那真身而云釋迦者答一以化身從舍那傳來故二謂釋迦即是舍那故戒經偈云如是千百億盧舍那本身是也二標處所謂坐菩提樹樹下得道因名道樹亦名覺樹三明得道謂成正覺四出所結法謂菩薩波羅提木叉此云別別解脫就第四中復有四初標所結名即是木叉二能成勝因即孝順父母等三位六別父母生育恩師僧法乳恩三寶度脫恩此謂重恩下云六道衆生皆是我父母則於一切通須孝順三明能得勝果謂至道法注中會通儒釋語同行別四結名字上並依天台疏分節孝名戒者以菩薩戒無非順物皆孝行故名制止者於衆生上斷諸惡故疏涅槃云奇哉父母生育我等受大苦惱滿足十月惱抱我身既生之後推乾就濕除去不淨大小便利乳哺長養將護我身以是義故當須報恩隨順供養記初敘恩以是下勸報初中上三句通標苦惱滿下別列苦相阿難問經說識託母胎凡經三十八箇七日每七一日各有一風吹令變易名為一轉計三十八箇七日總二百六十六日成九箇月五大四小故少四日又準五王經自此已前與母同氣爾後四日將欲趣産與母別氣則九月四日涉於十月今云滿足且論月滿然人受胎長短不定如羅云六年生死苦比丘六十年即脅尊者老聃八十年亦有五七月者故知十月多分為言疏上通明二教以孝為本竟疏次別明二教行孝之同異者於中初明其異後顯其同記大論二教在事皆異論心並同故初明異不妨自同及後明同還須見異顯儒釋之優劣彰事用之淺深欲使儒流歸心釋典故也疏初謂生前侍養異後謂沒後追思異疏侍養異者儒宗則慎護髮膚揚名後代故樂春不出曾子開衾釋教則祝髮壞衣法資現世故優陀通信淨藏回邪是謂為善不同同歸于孝記初總標二別釋又為二先儒後釋已後諸條分文皆爾是謂下後結示儒宗初二句出孝經經曰身體髮膚受之父母不敢毀傷孝之始也立身行道揚名於後世以顯父母孝之終也樂春者禮記云樂正子春為樂長名子春下堂而傷其足數月不出猶有憂色弟子問其故答曰吾聞諸曾子曾子聞諸夫子曰天之所生地之所養唯人為大父母全而生之子則全而歸之可謂孝矣不虧其體不辱其身可謂全矣君子頃音跬半步也步之間而不敢忘孝也是以有憂色曾子開衾論語云曾子有疾召門弟子曰啓豫足啓豫手開衾使視其體衾即被也詩云戰戰兢兢如臨深淵如履薄氷而今而後吾知免夫言今將死免傷於體釋教中祝髮祝即訓斷謂斷絶也壞衣青黑木蘭三如法色如物故壞不同世俗五方正間故也法資現世謂說法開悟令歸三寶優陀者普耀經云佛告優陀即佛弟子我初出家與父母誓若得佛道還度父母今已得佛必當還國汝以神足變現迦維羅衛令信吾身已成大道優陀奉教化現多瑞父乃信佛道果已成所謂通信也王問如來幾時還國優陀即答七日後來王喜嚴路合國欣仰時佛領四衆八部歸國入宮受王供養說法化導王得道證初果一切親族皆受戒法此說如來報親優陀但是傳信淨藏回邪即法華經妙莊嚴王夫人名淨德有二子一名淨藏二名淨眼其父信受外道婆羅門法二子現種種神變父王心淨信解所謂回邪也共詣宿王華智佛所發菩提心彼佛即授王記當得作佛號娑羅樹王於是以國付弟與夫人二子出家修道等二子回邪尚未出家則法資在先祝髮當後結中上句示異下句顯同尚書云為善不同同歸乎治為惡不同同歸乎亂今借而用之疏沒後異者有其三疏一居喪異儒則棺槨宅兆安墓留形釋則念誦追齊薦其去識記棺槨者周尸曰棺周棺曰槨宅兆即墓穴安墓謂置於墓中留形謂不使速朽念誦即通佛名經呪追齊謂追慕修齊去識即神靈所住之處疏二齊忌異儒則內齊外定想其聲容釋則設供講經資其業報記內齊等者儒中凡欲行祭祀先修齊戒禮記祭義云致齊於內三日廟中故曰內齊致謂精至致齊於外七日廟外靜定其心故曰外定齊之日思其居處思其語笑思其志意思其所樂思其所嗜所謂想聲容也設供講經與上念誦追齊皆一往趣舉隨力修崇不必楷定業報即所生處疏三終身異儒則四時殺命春夏秋冬釋則三節放生一歲終二夏滿三忌辰隨力所及皆須為父母放生命一七乃至七七之數初七諸七卒哭祥日然今但滿三年施戒盆會此經云云記且舉四時須兼月祭三節節即時也注中初示三節隨力下次教須行一七至七七且約至少更多為善初七下明餘時卒哭即百日祥日即周年三年據今至於終身而世中不行故云然今等施即布施戒謂受戒疏良由真宗未至周孔且使繫心愛禮存羊之類今知理有所歸不應猶執權教記殺命祭先違仁垂教欲令儒士咸稟佛言不唯亡過者脫苦生天抑使生存者懷仁受福初科真宗即佛教佛出周時教行西竺故云未至至於後漢始流此方若論祭法出於往古且取文典垂世故推周公孔子然而周孔皆是大權先制禮法使人從善然後佛化易可弘通四時祭祀非本聖意故云且使繫心注引論語證成權意彼云子貢欲去告明之餼羊告朔謂月祭生牲曰餼魯自文公不親視朔子貢欲使孔子撤之子曰賜也召子貢名爾愛其羊憫其徒死我愛其禮於事雖非且欲不廢告朔之禮此見權暫繫心之意也上二句出立祭本意下二句勸捨儒從釋理有歸者放生施戒等必能拔苦故權教者儒釋相望則儒教為權釋典皆實就釋教中自分權實如別所明疏且福之大者莫大於施生是梵釋之本因是天地之大德今殺彼祭此豈近仁心是若可忍孰不可忍雖云祈福月令云九月中氣日在氐命有司合秩芻以養犧牲乃至以祠宗廟之靈為人祈福實是立讐自徇虗名殃於神道故途中有歌哭二類記初四句敘放生之德上二句標放生者謂不殺物命是與其生下二句釋言福無如梵釋論德豈過天地此二備舉三才復兼兩教梵王修四等則慈心為首四等即慈悲喜捨亦名四弘四無量心帝釋修十善則不殺居初十善不殺不盜等易曰天地之大德曰生天地以生物為德又曰大哉乾元萬物資始天資地成品物全生生生無極德莫大焉今下次顯行殺之過又二初斥其違行儒宗以推愛及物為仁今既殺害他命祭我祖考深乖仁行行既不仁則非君子矣是若等者謂若此不仁之事尚忍為之則更有何事是不可忍耶雖下責其妄執初句標所執祈福之言出禮記月令祈求也注中每月有二氣寒露為九月節霜降為九月中二氣之中謂之中氣日在氐謂太陽躔氐宿命有司謂掌祭之官合秩芻合聚也秩芻即草犧牲純色牛羊豕乃至者略中間三句彼云以供皇天上帝名山大川四方之神次句彰非淨名云是殺生是殺生報佛說因果報應絲毫不差故云實也讐謂怨對下二句正責徇循也虗名即祈福之言神道即祖上幽靈注引事證出譬喻經彼云餓鬼五百歌舞而行好人五百啼泣而過或有問佛佛言餓鬼家子孫為其作福當得解脫故歌好人家子孫唯行殺害將受大苦故哭疏問若父母生於餘趣則可改祭為齊如墮鬼中寧無饗祀答黍稷非馨蘋蘩可薦應知礿祭勝於殺牛況鬼神等差豈皆受饗記問中以生鬼趣容受饗祀若令改祭則非考誠答中有二初明行祭在誠宜用素替之不必殺命初句出尚書武王命君陳曰君陳臣名我聞至治馨香感于神明黍稷非馨明德惟馨鬼神享德而不享物次句出左傳文云苟有明信㵎溪沼沚之毛苔草蘋蘩蘊藻之菜蘋即大萍蘩即是蒿薀音溫節中生藻即水藻筐筥錡釜之器方筐圓筥無足釜有足錡筥音舉錡音蟻潢汙行潦之水潢音黃汙音烏停水也潦音老行跡水也可薦於鬼神祭祀可羞於王公羞謂進獻應下二句出周易文曰東降殺牛殷紂厚祭不如西鄰之禴祭實受其福西伯文王薄祭祭祀尚德故厚不如薄況下二明鬼趣不同不必皆饗且用素亦可表心矣下明三品九類唯多財鬼有食可噉又中含云人死祭祝者若生入處餓鬼中者得食餘趣不得由各有活命故入處鬼者鬼中別類之名疏上明異竟疏次顯其同者復有二初明存沒同後明罪福同疏今初約紀孝行章中五句之文以辨其同即攝於生前沒後也記紀孝行章即孝經第十章五句中前三攝生前後二屬沒後疏一云居則致其敬者儒則別於犬馬釋則舉身七多記居謂平居之時儒中別犬馬者論語云子游問孝子曰今之孝者是謂能養衣食直養至於犬馬皆能有養養通餘類不敬何以別乎養親不敬則與養餘類無以簡別釋中即佛初成道還本國時淨飯王嚴駕出迎見佛作禮佛即踊身虗空高七多羅樹一多羅高七仞一仞七尺合數可見禮訖下地發言起居等佛為世間慈父猶故敬親不正受禮意使將來以此為法疏二養則致其樂者儒則怡聲下氣溫清定省等也故有扇床溫席之流釋則節量信毀分減衣鉢等也故有割肉充飢之類須闍太子記儒中曲禮云父母有過下氣怡聲以諫之又云凡為人子之禮冬溫而夏清溫帝扇床清音倩涼也昏定而晨省定衾枕省安居故下舉事東觀漢記云黃香孝廉無婢僕躬執勤勞竭力侍養暑則扇床枕寒則以身溫席釋中節謂節約量即觀量信毀謂信與不信僧祇律云父母不信三寶即少供信即恣與減衣鉢者若三衣一鉢理無與俗或恐字誤合云衣食然今世俗謂僧長物以為衣鉢或恐疏主隨俗為言此謂貧乏故須分減必自富足不須強與施物難消反成罪纍割肉充飢大報恩經云須闍太子父母被賊所篡逃逝外國失路絶糧乃割己肉供須父母令達前路疏三病則致其憂者儒中如文帝先嘗湯藥武王不脫冠帶釋中如太子以肉為藥高僧以身而擔記儒中漢書云文帝母疾病踰年文帝目不睫不解衣冠湯藥不嘗不進禮記云文王有疾武王不脫衣冠而養文王一飯亦一飯文王再飯亦再飯旬有二日乃間間謂病差釋中大報恩經云忍辱太子父母病重醫者云須不瞋人肉為藥太子自念生來不瞋因名忍辱可充此藥又念國中設有不瞋者如何取彼救我親乎遂自割肉充藥厥疾乃瘳音抽唐僧傳云高齊道紀往必荷擔不耻微行經書塔像為一頭老母掃為一頭齊佛境內有塔斯掃每語人曰經不云乎掃僧地如閻浮不如佛地一掌者由智田勝也親供母者福與登地菩薩齊也至於便利女人經理不許人兼或有助者紀曰母吾母也非他之母形骸之纍並吾身也有身必有苦何得以苦勞人所以身為苦先幸勿相助疏四喪則致其哀者儒有武丁不言子臯泣血釋有目連大呼調御舁棺於儒禮雖不同而亦哀有餘也記儒中武丁殷高宗名論語子張問曰高宗諒陰三年不言何謂也信任百官陰默三年子曰何必高宗古之人皆然子臯即高柴禮記云高子臯執親之喪也泣血三年泣無聲如血下未嘗見齒少言笑故釋中目連緣如後釋調御即佛通號對舉曰舁增一阿含經云淨飯王崩白氎棺殮佛與難陀在前阿難羅云在後難陀白佛父王養我願聽擔棺阿難羅云亦爾佛念當來凶暴不報父母故躬自擔棺大千六反震動釋梵諸天皆來赴喪代佛擔之佛執香爐前引就山注中以此門明同而引事全別故特點之上句示事異下句明哀同而哀又過之故云有餘後注亦然準前三句例須通會儒釋事別敬樂憂同疏五祭則致其嚴者儒有薦筍釋有餉飯之類也嚴雖有異祭意大同記嚴謂精嚴儒中孝德傳云西晉孟宗為郎中母喪委官而歸母性嗜筍宗每當時供奉母亡後冬至欲以筍祭乃入竹園哀告天地乃得以薦之餉飯即目連事如下引餉猶獻也疏以至教未來難弘報應故先且立於祭法令敬事於神靈記至教即佛法報應即三世因果言且立者示權義也疏神靈則父母之識性是顯祖考之常存既形滅而神不滅豈厚形而薄神乎餘如前辨記上二句會異前引月令云四方之神宗廟之靈儒謂神靈即佛教識性靈識不滅所謂常存下二句反責儒教尚形生事死葬及祭等禮皆為重形言厚形者謂但行祭祀言薄神者謂不嚴去識若稟佛教則厚神而薄形矣形同朽木不足可貴神是心靈特須濟拔下句指前即明異中疏上來存沒同竟疏次辨罪福同疏罪同者儒則條越五刑犯當五擲而恩赦不該釋則名標七逆戒黜七遮而阿鼻定入記儒中五刑者墨墨額劓魚器反截鼻剕音費截腳宮男去勢女幽閉大辟音闢死也此古五刑笞杖徒流死為今五刑古今雖殊而五逆罪不在其內故云條越孝經云五刑之屬三千而罪莫大於不孝言在五刑之外五擲以五車繫五體縱橫裂之三十國春秋云池湯用妻言將母於山中殺之秦王聞令以五車殺之恩赦不該者縱有大赦必先除五逆例不該赦赦即放也釋中小乘五逆殺父害母殺阿羅漢出佛身血破和合僧大乘更加殺和尚闍黎名為七逆梵網中殺聖人即殺阿羅漢也戒黜者謂七逆之人戒法簡退並是戒障故名七遮梵網云若有七遮者師不應與受戒無者得受觀佛相好經說犯逆為阿鼻因阿鼻此翻無間涅槃云間無暫樂故云無間又一人獨墮此獄身遍獄中間無空處其獄四方交過通徹八萬由旬身與獄等不相彰礙疏福同者儒則旌於門閭上天之報釋則瑩於戒德淨土之因如觀經說當修三福一孝養父母等乃至此三種業是三世諸佛淨土正因記儒中國家凡於州縣有行孝者即賜旌表榜其門閭斯亦勸獎之意上天報者以釋校儒盡誠行孝必得生天上句現福下句來報舊謂舜行孝堯以二女妻之等為上天報者非對下釋教於義頗疏釋中瑩戒德者孝名為戒行孝則戒德清白注中文略應從父母字下接云奉事師長慈心不殺修十善業二者受持三歸具足衆戒不犯威儀三者發菩提心深信因果讀誦大乘勸進行者如是三事名為淨業餘如注引疏上來總彰孝道竟疏次當第四示勝田者疏喻如世間人欲得倉廩中五穀豐盈歲歲不乏者必須取穀麥種子以牛犂耕於田地而種之不種則竭盡也記舉喻可解五穀謂麻黍稷麥豆也疏法中亦爾以悲心敬心孝心為種子以衣食財帛身命為牛犂以貧病三寶父母為田地記悲心對貧病悲田敬心對下三寶敬田孝心對下父母恩田衣食為外財身命為內財疏有佛弟子欲得藏識中百福莊嚴生生無盡者須運悲敬孝心將衣食財帛身命敬養供給於貧病三寶父母名為種福也不種即貧窮無福慧入生死險道謂種福之田如種穀之田名為福田也記佛弟子合上世人藏識合倉廩等須運下合上取種子等不下合上竭盡謂下示名上云三田皆可種福通號福田福田之名法喻合舉疏然種子有精新乾焦田有肥濃確瘦如悲敬孝心有懇切間慢貧有淺深病有輕重佛有真化化有住世入滅法有小大教有權實僧有持毀父母有所生七世一一配肥瘦之田昭然可見記初舉喻確瘦謂瘠薄之地如下配法初配種子懇切如精新間慢如乾焦貧下二配田地有三初配悲田淺輕如瘦深重如肥佛下配敬田佛則真住為濃化滅為瘦法則權小為瘦實大為肥僧則毀戒為瘦持奉為肥父母下配恩田所生為肥七世為瘦疏今盂蘭供會具三種肥田故云勝也謂佛歡喜日供養自恣淨戒大德敬田勝也報父母恩恩田勝也父母在厄難中悲田勝也為欲示此勝田故說此經記初總標謂下別示敬田中佛歡喜是佛寶自恣是法寶淨戒大德是僧寶恩田是今正宗悲田本濟貧病今舉厄難以意取之即下經云當為七世現世父母厄難中者是也為下結顯疏第二藏乘所攝者藏謂三藏乘謂五乘記藏能含蘊乘能運載故以比焉三藏約教五乘約行疏三藏者疏一修多羅此云契經契者契理契機經者佛地論云貫攝為義謂貫穿所應知義攝持所化衆生故此教於三學中詮於定學記初翻名亦名修妬路契者下次釋義初釋契義契理者皆如實故契機者能隨宜故契即合也次釋經義論中貫穿義者持於名理也攝持衆生者被於物機也此下結判詮即顯也疏二毗奈耶此云調伏調謂調練三業伏謂制伏過非此教詮於戒學記翻名釋義並據一端亦云毗那耶毗尼等古翻為滅正翻為律調練對治是作持行制伏離過即止持行疏三阿毗達磨此云對法法謂涅槃四諦對謂對向對觀其能對者即無漏慧此教詮於慧學記初翻名亦云阿毗曇法謂下釋義涅槃是所向果四諦即所觀理二皆屬境對向配涅槃對觀配四諦二並屬智無漏慧者初果已去斷惑智也疏然經是化教開誘化導也律是制教制約行業也論則推徵解釋記開誘化導者但開信解任物違從制約行業者必使修持不容違背論中推徵解釋該上化制經律各局論則兩通疏今此盂蘭盆據其名題即化教所攝屬於經藏據其義意亦制教攝屬於律藏制比丘等年年自恣日行此法故記據名題者題云經故據義意者如注顯故今詳後判誠所未安且約藏攝經要知所屬若依兩判未審此經定屬何藏一不可也又題標經義義必應題若謂據題屬經據義屬律是則題與義別兩不相應二不可也又經中但云行慈孝者皆應先為父母作盂蘭盆又云是佛弟子修孝順者應念念中常憶父母為作盂蘭盆等此乃通途勸導正是化義何嘗定制比丘等年年行耶三不可也又南山云化教通於道俗行教唯局內衆即制教也準下具列國王太子百官萬民通明道俗非專內衆四不可也又下疏云制令必為不為即是違制且律明違制必須結犯今不行蘭盆為結何罪五不可也此由不達化制遂致乖疏義學存公無宜執舊疏五乘者乘以運載為名五謂人天聲聞緣覺菩薩此五力有大小載有遠近記初示名五下列位人乘力小載近菩薩力大載遠中間三位望前則大遠望後則少近菩薩乘者從此因名云佛乘則從果號疏一人乘謂三歸五戒運載衆生越於三塗生於人道其猶小艇過溪㵎記初標二釋釋中先法後喻法中有所乘法所越境所感報下三例此分之三歸則從師作法歸投三寶五戒謂不殺不盜不邪淫不妄語不飲酒才猶略也疏二天乘謂上品十善及四禪八定運載衆生越於四洲達於上界如次船越小江河記十善分三品下品修羅中品生人上品生欲界天四禪別舉色界異上界故八定總色無色俱不動業故四洲欲界下地是所越境上界通指三天即所感報若第論所越則十善越四洲四禪越欲有四空越色有疏三聲聞乘謂四諦法門四緣覺乘謂十二因緣法門皆運載衆生越於三界到有餘無餘涅槃成阿羅漢及辟支佛皆如大船越大江河記聲聞緣覺乘法雖殊所越所到二皆無異故合明之結惑已盡若依身在名有餘涅槃化火焚身身智俱亡名無餘涅槃疏五菩薩乘謂悲智六度法門運載衆生總超三界三乘之境至無上菩提大般涅槃之彼岸如乘舶過海記下化故悲上求故智施戒進忍禪智為六修此六法能至彼岸故云六度越三界出分段也越三乘出變易也菩提涅槃即佛果菩提翻覺揀二乘自覺菩薩未滿故云無上涅槃翻寂滅揀前小乘故云大也舶大船也疏今此經者是人天乘所攝在小乘藏中記圭峰判釋依賢首宗彼立小乘有二一者人天二即二乘此經猶非小乘但攝屬小乘耳今應問曰如此判經為從何義孤山云約所救人說若謂目連母脫苦生天而云人天者且目連母亦止生天那得兼人又生天之語遍諸大乘如法華云書寫是經命終當生忉利天上受持讀誦即往兜率天等又梵網云講說菩薩戒福資亡者生人天上又云受持菩薩戒者常生人道天中等即應皆屬人天教耶又上所明人天兩乘行果全別如何一混而云人天既云攝教須定所歸畢竟此經為歸何攝又彰孝道中引華嚴涅槃對明釋教以孝為本既引圓頓終窮了義而彰孝道如何判教止在人天又歸敬偈云纍劫報親恩積因成正覺則顯孝行深通佛乘及乎判經而云人天豈非前後自相違耶又孤山記中釋歸敬偈則明同體三寶乃云真如性中有覺了軌持和合義故又釋離苦安樂乃云得無上菩提大涅槃常樂我淨四德之樂又釋主成就即云了迷即真而妄菩提即煩惱故了悟即妄而真煩惱即菩提故又釋異熟果即明八識真異熟等既用大乘名義釋上諸文則不當判為人天小教既約人天小教判此一經則不當用大乘名義釋上諸文又釋十地大人權現乃云即同法華內祕菩薩外現聲聞仍自問云今經與法華何別既以此經判屬人天那將法華挍其同別是知疏記宗途紊亂始末差訛歷代同迷莫知體究且夫人天為教唯被極鈍之機令脫三途容可受道未免生死非佛本懷是故天台四教不列人天南山二疏唯存聖道乃曰為道制戒本非世福天主人王咸興有教佛還說有則與凡同等請尋祖訓深究佛心豈唯洞曉一經抑乃通明大化矣今詳此經三藏之中定屬經藏化教所收五乘之中定屬菩薩大乘所攝然凡論判教一觀正宗所詮行相二考聽衆結益淺深三求文義意趣優劣行是一經之主益乃被物之功文即能詮之體用斯以判無往不通初明行者且通論孝行則有多途若同儒宗純孝奉親止是世報人天行也若如目連為親修道果成羅漢即是小乘聲聞行也若同前引華嚴涅槃十六觀經並是菩薩大乘之行次局就今經唯專大行良以於自恣日設供報恩一運已誠二兼他力無論存沒不簡自他憫物傾財拔苦與樂既非小行須歸大乘故經云吾今當說救濟之法令一切難皆離憂苦且一切之語遍該生境豈止吾親離苦之言畢超二死非唯鬼趣即梵網云一切衆生皆我父母我生生無不從之受生即前所謂纍劫報恩積因成佛準斯明據大教何疑二明結益謂經家結示同聞之衆開悟證入故云結益非謂約彼所救之人即如經云目連比丘及大菩薩衆皆大歡喜若是小行人天凡福豈得大菩薩衆聞皆歡喜既云歡喜即是開悟增發大心故下引恩重經結益云帝釋諸天發菩提心豈非明證彼經又云若善男女能為父母受持此大乘摩訶般若一句一偈一經耳目五逆重罪悉得消滅二經同類而彼明標大乘決無疑矣三明文義一者如上示行文二者即前結益文三同聞之衆有大菩薩四受供僧中有十地權化安有小教而談十地示權耶五智升法師大藏目録判在大乘深符經旨而孤山記中輒斥為謬秉筆垂訓率易若此且録中所判一代時經如何此經獨指為謬古録有判小乘者已為升師所破世多執諍不免繁辭幸依法而勿依人豈聞義而不能從所慮淹沉至教抑塞來蒙誠不遑安固非好辨宗師不黨試為裁之疏三辨定宗旨者此經以孝順設供拔苦報恩為宗今以二門分別一釋行相二配句數記總分有四孝順是心設供是事拔苦是功報恩是用今詳經宗宗是主義國無二主安得有四今立報恩為宗餘三任運自攝經文首標欲報父母乳哺之恩斯一證也又疏引三譯第三立題為報恩經斯二證也且依疏釋學者宜知疏初者謂目連本為孝誠欲酬恩德力所未及故先出家是以始得六通便觀三界見其亡母生餓鬼中諸得道人未必皆為父母即驗目連為欲報恩故出家也雖餉香餐旋成猛火悲號投佛奉教設盆拔冥塗身脫一劫苦不辜生育大報劬勞細詳經宗備斯四義記初敘孝順注文遮疑恐疑諸聖入道皆因親故始得便觀故云即驗雖下敘設供旋字平呼尋也拔下敘拔苦不下敘報恩末後二句總結疏二配句數者有四四句疏一孝順兩字自有四句一孝而非順如三牲之養等二順而非孝如病索禁忌之食而即供欲行非為之事而不諫等三亦孝亦順謂有隱無犯三諫而隨順色觀志三年無改四非孝非順如水中葬父之類記第一句孝經云居上不驕為下不亂在醜不爭醜即衆也居上而驕則亡為下而亂則刑在醜而爭則兵兵謂兵鬪三者不除雖日用三牲之養猶為不孝也彼謂不孝今云孝者以其非不盡養但不能修己故云非順第二句供忌食惡不諫是順而非愛親故非孝孝經云父有爭子則身不陷於不義故當不義則爭之從父之令又焉得為孝乎第三句中禮記云事親有隱而無犯當隱過幾諫不犯顏事君有犯而無隱當犯顏直諫言其得失事師無犯無隱雖不犯顏容言得失事親是恩事君是義師則恩義之間三諫隨者禮云子之事親也三諫而不聽則號泣而隨之順色者論語云子夏問孝子曰色難注云承順顏色乃為難也觀志者禮記曾子曰君子之謂孝者先意承志諭父母孝道此謂子觀父志頗合文意與下論語言同意別或可字誤合云承志三年無改者論語云父在觀其志父沒觀其行三年無改於父之道可謂孝矣四中世傳昆子有作渾子水葬父在昆明池中由子不孝多違於父父令棄水意使土葬而子特順之反是不順疏二以孝順與設供相對復為四句一孝順非設供如董黯王祥等二設供非孝順為己求福而修齊等三俱是即盂蘭盆會四俱非謂逆而慳也記初句孝德傳云董黯會稽人作句章人少孤養母承顏致樂雖貧而充鄰有惡人令母常憂雖富而悴因相問之鄰人怒候黯不在遂擊其母母告黯黯恨至母終葬訖謂盧墓三年服除已遂殺鄰人將頭以獻之曰娘知始在侍養今養終讐訖自投官聲罪會赦免之王祥母嗜魚嚴凝氷凍祥即臥氷得魚奉母第三中二俱句指蘭盆者欲簡經宗故也下二亦爾例前孝順雙亦一句收盂蘭盆四中逆故非孝慳不設供疏三以孝順對拔苦亦為四句一孝順非拔苦謂董永等二拔苦非孝順謂救他人之苦厄三俱是即盂蘭會也四俱非謂逆小之人也記初句董永家貧母喪遂傭身葬母感天女為妻織絹以贖之四中逆即非孝小人不濟他苦疏四以孝順對報恩亦為四句一孝順非報恩護髮膚不驕危非法不言等二報恩非孝順扶輪報一食修行報施主等三俱是盂蘭盆會也四俱非謂辜恩逆人記初句引事並出孝經餘如前引卿大夫章云是故非法不言非道不行然後能守其宗廟次句扶輪報餐者左傳云晉侯靈公飲趙盾酒伏甲甲兵將攻之公無道盾數諫欲殺之初盾田田獵於首山見靈輒餓問之曰不食三日矣食之舍其半問之曰官三年矣官學也未知母之存否今近焉請以遺之既而為公介輒為靈公甲士倒戟以禦盾走伏兵至輒乃擊之史記作反擊伏土公徒而免之公謀不成盾免此難問曰何故對曰翳桑之餓人也問其名居名與所居不告而退遂自亡也輒亦去國按左傳史記並無扶輪之說唯類林有之彼云盾走出乘車車已脫一輪公先令人脫之輒扶盾上車以臂承軸軀駕而行疏今修此一門即圓四行所得功德何可挍量實由境勝心弘徹於神理故也記初顯功勝實下推所由境勝即三田心強即三心徹通也神理謂幽冥之處
